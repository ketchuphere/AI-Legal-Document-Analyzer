[tool.pytest.ini_options]
testpaths   = ["tests"]
addopts     = "-v --tb=short --cov=src --cov-report=term-missing"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["src"]
omit   = ["*/__init__.py"]

[tool.coverage.report]
show_missing = true
fail_under   = 70
