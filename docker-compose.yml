# ──────────────────────────────────────────────────────────────
# AI Document Analyzer — Docker Compose
# Start:  docker compose up --build
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:
  app:
    build: .
    image: ai-doc-analyzer:latest
    container_name: ai_doc_analyzer
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Persist nothing sensitive; uploads are in-memory only
      - ./docs:/app/docs:ro    # optional: mount sample docs for testing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - app
